name: Refresh authored grammar text

# Fast path for updates from the project-authored grammar sites. Unlike the full
# reference refresh, this only rebuilds the vendored Hokkaido/Sakhalin grammar
# snapshot and reloads the authored rows in grammar_materials / grammar_fts.
#
# Expected repository_dispatch payload from upstream grammar repos:
#   { "event_type": "authored-grammar-changed", "client_payload": { "repo": "ainu-grammar-hokkaido" } }
# or:
#   { "event_type": "authored-grammar-changed", "client_payload": { "repo": "aynu-itah" } }

on:
  workflow_dispatch:
    inputs:
      reason:
        required: false
        description: Why are you refreshing authored grammar text?
      source:
        required: false
        type: choice
        description: Which authored grammar source to refresh
        default: all
        options: [all, hokkaido, sakhalin]
  repository_dispatch:
    types: [authored-grammar-changed]

concurrency:
  group: refresh-authored-grammar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-authored-grammar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AINU_ROOT: ${{ github.workspace }}/_data
    steps:
      - name: Checkout ainu-mcp
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Decide source to refresh
        id: decide
        env:
          INPUT_SOURCE: ${{ inputs.source || '' }}
          DISPATCH_REPO: ${{ github.event.client_payload.repo || '' }}
        run: |
          set -euo pipefail
          source="${INPUT_SOURCE:-all}"
          case "$DISPATCH_REPO" in
            ainu-grammar-hokkaido) source="hokkaido" ;;
            aynu-itah|ainu-itah) source="sakhalin" ;;
            "") ;;
            *) echo "::warning::Unknown dispatch repo '$DISPATCH_REPO'; refreshing all authored grammar sources" ;;
          esac
          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "refreshing source: $source"

      - name: Clone selected authored grammar source repo(s)
        env:
          SOURCE: ${{ steps.decide.outputs.source }}
        run: |
          set -euo pipefail
          mkdir -p "$AINU_ROOT"
          clone_repo() {
            local repo="$1" dir="$2"
            echo "::group::clone $repo → $dir"
            git clone --depth 1 "https://github.com/$repo.git" "$AINU_ROOT/$dir"
            echo "::endgroup::"
          }
          case "$SOURCE" in
            all)
              clone_repo "aynumosir/ainu-grammar-hokkaido" "ainu-grammar-hokkaido"
              clone_repo "mkpoli/ainu-itah" "aynu-itah"
              ;;
            hokkaido)
              clone_repo "aynumosir/ainu-grammar-hokkaido" "ainu-grammar-hokkaido"
              ;;
            sakhalin)
              clone_repo "mkpoli/ainu-itah" "aynu-itah"
              ;;
            *)
              echo "::error::Unknown source '$SOURCE'"
              exit 1
              ;;
          esac

      - name: Set up uv (Python ETL)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --frozen

      - name: Rebuild authored grammar snapshot + seed
        env:
          SOURCE: ${{ steps.decide.outputs.source }}
        run: |
          set -euo pipefail
          uv run python scripts/update_authored_grammar_snapshot.py --source "$SOURCE"
          uv run python scripts/build_authored_grammar_seed.py

      - name: Commit snapshot if changed
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet -- src/ainu_mcp/data/authored_grammar_texts.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "snapshot unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/ainu_mcp/data/authored_grammar_texts.json
            git commit -m "Update authored grammar text snapshot"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install worker deps (@libsql/client for the loader)
        working-directory: worker
        run: bun install --frozen-lockfile

      - name: Ensure grammar public-text schema exists
        working-directory: worker
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        # Deliberately WITHOUT --allow-fts-rebuild: this fast path only reloads the
        # authored grammar rows, so it must never trigger a destructive grammar_fts
        # rebuild (that would drop the legacy ainu-grammar OCR fulltext). On an
        # up-to-date schema this is a no-op; if a rebuild were ever needed it aborts,
        # and you should run the full "Refresh Turso reference data" workflow instead.
        run: bun scripts/apply-grammar-public-text-migration.mjs

      - name: Reload authored grammar rows only
        working-directory: worker
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun scripts/load-turso.mjs seed/data/authored_grammar_refresh.sql
